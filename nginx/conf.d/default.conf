# ── Redirect HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    server_name hostera24.com api.hostera24.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend (hostera24.com) ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name hostera24.com;

    ssl_certificate     /etc/letsencrypt/live/hostera24.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hostera24.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://website:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Backend API (api.hostera24.com) ────────────────────────────────
server {
    listen 443 ssl;
    server_name api.hostera24.com;

    ssl_certificate     /etc/letsencrypt/live/hostera24.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hostera24.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads directory
    location /uploads/ {
        proxy_pass http://backend:4000/uploads/;
    }
}
