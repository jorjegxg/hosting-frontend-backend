services:
  db:
    image: mysql:8.0
    container_name: hosting-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./hosting-backend
      dockerfile: Dockerfile
    container_name: hosting-backend
    restart: unless-stopped
    # Cu nginx pe host: doar localhost. Fără nginx: folosește "4000:4000" temporar.
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_FROM: ${SMTP_FROM}
      ORDER_NOTIFY_EMAIL: ${ORDER_NOTIFY_EMAIL:-}
      # Used by Stripe Checkout success/cancel redirects (must match public site URL).
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_HOSTING_9_99_MONTHLY: ${STRIPE_PRICE_HOSTING_9_99_MONTHLY}
      STRIPE_PRICE_FULL_STACK_19_99_MONTHLY: ${STRIPE_PRICE_FULL_STACK_19_99_MONTHLY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal

  website:
    build:
      context: ./hosting-website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_APP_MODE: production
    container_name: hosting-website
    restart: unless-stopped
    # Cu nginx pe host: doar localhost. Fără nginx: folosește "4001:4001" temporar.
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      BACKEND_URL: http://backend:4000
      PORT: 4001
    depends_on:
      - backend
    networks:
      - internal


volumes:
  db_data:
  uploads_data:

networks:
  internal:
    driver: bridge
