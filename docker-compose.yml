services:
  db:
    image: mysql:8.0
    container_name: hosting-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
      MYSQL_DATABASE: ${DB_NAME:-myappdb}
      MYSQL_PORT: ${DB_PORT:-3308}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-mysecretpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
